services:
  backend:
    build:
      context: ./backend
    image: fraud-watch-backend:deploy
    container_name: fraud_watch_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.deploy
    environment:
      APP_ENV: production
      PYTHONPATH: /app
    expose:
      - "8000"
    volumes:
      - backend_logs:/app/logs
      - backend_reports:/app/data/reports
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    image: fraud-watch-frontend:deploy
    container_name: fraud_watch_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  db-init:
    build:
      context: ./backend
    image: fraud-watch-backend:deploy
    container_name: fraud_watch_db_init
    profiles:
      - init
    env_file:
      - ./backend/.env.deploy
    environment:
      APP_ENV: production
      PYTHONPATH: /app
    command: sh -c "alembic upgrade head && python scripts/init_db.py"
    restart: "no"

volumes:
  backend_logs:
  backend_reports:
