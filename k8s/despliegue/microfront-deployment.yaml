apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: fraud-watch
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: YOUR_ACR_NAME.azurecr.io/fraud-watch-frontend:latest
          ports:
            - containerPort: 80
