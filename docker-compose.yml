services:
  postgres:
    image: postgres:16
    container_name: fraud_watch_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fraud_watch
      POSTGRES_USER: fraud_user
      POSTGRES_PASSWORD: fraud_password
    ports:
      - "5432:5432"
    volumes:
      - fraud_watch_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud_user -d fraud_watch"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
    container_name: fraud_watch_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://fraud_user:fraud_password@postgres:5432/fraud_watch
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn src.api.app:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: fraud_watch_frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  fraud_watch_postgres_data:
